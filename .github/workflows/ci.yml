name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Отменяем устаревшие прогоны на той же ветке/PR (экономия раннеров).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Тесты покрывают только чистые модули src/lib/** (node --test, мокнутый fetch).
# Playwright-браузеры не нужны — пропускаем их скачивание при npm ci.
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fast-fail: парс-безопасность всех исходников до запуска полного набора.
      - name: Parse check (node --check)
        run: |
          for f in src/*.js src/lib/*.js; do
            node --check "$f"
          done

      - name: Run tests
        run: npm test
