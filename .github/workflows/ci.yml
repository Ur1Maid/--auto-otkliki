name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Тесты покрывают только чистые модули src/lib/** (node --test, мокнутый fetch).
# Playwright-браузеры не нужны — пропускаем их скачивание при npm ci.
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
